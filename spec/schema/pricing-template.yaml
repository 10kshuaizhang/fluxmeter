# FluxMeter pricing template — copy to contrib/pricing/ and customize.
# Prices are USD per million tokens unless noted.
# Reference engine uses microdollar arithmetic (long) internally.

version: "1"
effective_date: "2025-06-01"
description: "Default OpenAI / Anthropic / Google models"

# cache_read_price = input_price * cache_read_multiplier (default 0.5)
cache_read_multiplier: 0.5

# Monthly volume meter scope (v2.4: customer_model only)
volume_scope: customer_model

# Billing period for tier counters (v2.4: calendar_month only)
billing_period: calendar_month

models:
  gpt-4o:
    input_per_m: 2.50
    output_per_m: 10.00
  gpt-4o-mini:
    input_per_m: 0.15
    output_per_m: 0.60
  # Example volume pricing (entire event billed at tier determined by monthly volume):
  # gpt-4o-mini-tiered:
  #   pricing_mode: volume
  #   input_per_m: 0.15
  #   output_per_m: 0.60
  #   tiers:
  #     - up_to_tokens_m: 10
  #       input_per_m: 0.15
  #       output_per_m: 0.60
  #     - up_to_tokens_m: null
  #       input_per_m: 0.10
  #       output_per_m: 0.40
  # Example graduated pricing (tokens split across tiers; see contrib/pricing/tiered-example.json):
  # claude-sonnet-4-tiered:
  #   pricing_mode: graduated
  #   input_per_m: 3.00
  #   output_per_m: 15.00
  #   tiers:
  #     - up_to_tokens_m: 1
  #       input_per_m: 2.00
  #       output_per_m: 4.00
  #     - up_to_tokens_m: null
  #       input_per_m: 1.00
  #       output_per_m: 2.00
  o1:
    input_per_m: 15.00
    output_per_m: 60.00
  o3-mini:
    input_per_m: 1.10
    output_per_m: 4.40
  claude-opus-4:
    input_per_m: 15.00
    output_per_m: 75.00
  claude-sonnet-4:
    input_per_m: 3.00
    output_per_m: 15.00
  claude-haiku-4:
    input_per_m: 0.80
    output_per_m: 4.00
  gemini-1.5-pro:
    input_per_m: 3.50
    output_per_m: 10.50
  gemini-1.5-flash:
    input_per_m: 0.075
    output_per_m: 0.30
  text-embedding-3-small:
    embedding_per_m: 0.02
  text-embedding-3-large:
    embedding_per_m: 0.13

defaults:
  input_per_m: 1.00
  output_per_m: 3.00
  embedding_per_m: 0.10

# Prefix matching: gpt-4o-2024-08-06 → gpt-4o (longest prefix wins)
prefix_models:
  - gpt-4o-mini
  - gpt-4o
  - o3-mini
  - o1
  - claude-opus-4
  - claude-sonnet-4
  - claude-haiku-4
  - gemini-1.5-pro
  - gemini-1.5-flash
  - text-embedding-3-large
  - text-embedding-3-small
