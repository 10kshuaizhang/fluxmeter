global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: flink-jobmanager
    static_configs:
      - targets: ["jobmanager:9249"]
        labels:
          component: jobmanager

  - job_name: flink-taskmanager
    static_configs:
      - targets:
          - "taskmanager-1:9249"
          - "taskmanager-2:9249"
          - "taskmanager-3:9249"
        labels:
          component: taskmanager
