version: '3.8'

# High-throughput local profile: 100K eps sustained, 1M eps burst.
# Requires ~12 GB free RAM (3 TM × 5G + Kafka 4G + Redis 4G + overhead).
# Submit: make submit-job  (parallelism 12)

x-flink-tm: &flink-tm
  image: flink:1.18.1-java17
  depends_on:
    - jobmanager
  command: taskmanager
  restart: unless-stopped
  environment: &flink-tm-env
    FLINK_PROPERTIES: |
      jobmanager.rpc.address: jobmanager
      taskmanager.numberOfTaskSlots: 4
      taskmanager.memory.process.size: 5g
      state.backend: hashmap
      state.checkpoints.dir: file:///opt/flink/checkpoints
  volumes:
    - ./flink-checkpoints:/opt/flink/checkpoints
  mem_limit: 6g

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: fluxmeter-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 24
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 16
      CLUSTER_ID: 'fluxmeter-cluster-001'
    mem_limit: 4g

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: fluxmeter-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka..."
        for i in $(seq 1 30); do
          /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1 && break
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic token-events --partitions 24 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --alter \
          --topic token-events --partitions 24 2>/dev/null || true
        echo "token-events: 24 partitions ready"
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: fluxmeter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --io-threads 4
      --io-threads-do-reads yes
      --tcp-backlog 511
      --maxmemory 3gb
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    mem_limit: 4g

  jobmanager:
    image: flink:1.18.1-java17
    container_name: fluxmeter-jobmanager
    restart: unless-stopped
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 12
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/checkpoints
      CHECKPOINT_DIR: "file:///opt/flink/checkpoints"
    volumes:
      - ./flink-checkpoints:/opt/flink/checkpoints
    mem_limit: 2g

  taskmanager-1:
    <<: *flink-tm
    container_name: fluxmeter-taskmanager-1
    environment: *flink-tm-env

  taskmanager-2:
    <<: *flink-tm
    container_name: fluxmeter-taskmanager-2
    environment: *flink-tm-env

  taskmanager-3:
    <<: *flink-tm
    container_name: fluxmeter-taskmanager-3
    environment: *flink-tm-env

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: fluxmeter-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: fluxmeter
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - ./baseline/init.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      - kafka
    mem_limit: 4g

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fluxmeter-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
      FLUXMETER_AUTH_OPTIONAL: "true"
      BUDGET_FAIL_POLICY: "open"
    depends_on:
      - redis
      - kafka
    mem_limit: 512m

  grafana:
    image: grafana/grafana:10.3.1
    container_name: fluxmeter-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: fluxmeter
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - redis
    mem_limit: 512m

  webhook-worker:
    build:
      context: .
      dockerfile: api/Dockerfile.webhook
    container_name: fluxmeter-webhook-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
      ALERT_TOPIC: budget-alerts
    depends_on:
      - redis
      - kafka
    mem_limit: 128m

  reconcile-job:
    build:
      context: .
      dockerfile: jobs/Dockerfile
    container_name: fluxmeter-reconcile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RECONCILE_INTERVAL_SEC: "300"
    depends_on:
      - redis
    mem_limit: 128m

volumes:
  redis-data:
