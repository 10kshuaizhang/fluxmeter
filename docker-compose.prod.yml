# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# NOT compatible with `make demo` without setting secrets in .env

version: '3.8'

services:
  redis:
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}

  jobmanager:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  taskmanager-1:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  taskmanager-2:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  api:
    environment:
      FLUXMETER_AUTH_OPTIONAL: "false"
      FLUXMETER_API_KEY: ${FLUXMETER_API_KEY:?FLUXMETER_API_KEY required}
      FLUXMETER_ADMIN_KEY: ${FLUXMETER_ADMIN_KEY:?FLUXMETER_ADMIN_KEY required}
      BUDGET_FAIL_POLICY: "closed"
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  grafana:
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}

  clickhouse:
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD required}
