apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: fluxmeter-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: fluxmeter-api
  template:
    metadata:
      labels:
        app: fluxmeter-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: FLUXMETER_AUTH_OPTIONAL
              value: {{ .Values.api.env.FLUXMETER_AUTH_OPTIONAL | quote }}
            - name: BUDGET_FAIL_POLICY
              value: {{ .Values.api.env.BUDGET_FAIL_POLICY | quote }}
            - name: FLUXMETER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: api-key
            - name: FLUXMETER_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-key
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
