version: '3.8'


services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: fluxmeter-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12
      CLUSTER_ID: 'fluxmeter-cluster-001'
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: fluxmeter-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 1G

  jobmanager:
    image: flink:1.18.1-java17
    container_name: fluxmeter-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/checkpoints
      CHECKPOINT_DIR: "file:///opt/flink/checkpoints"
    volumes:
      - ./flink-checkpoints:/opt/flink/checkpoints
    deploy:
      resources:
        limits:
          memory: 2G

  taskmanager-1:
    image: flink:1.18.1-java17
    container_name: fluxmeter-taskmanager-1
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 4g
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - ./flink-checkpoints:/opt/flink/checkpoints
    deploy:
      resources:
        limits:
          memory: 5G

  taskmanager-2:
    image: flink:1.18.1-java17
    container_name: fluxmeter-taskmanager-2
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 4g
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - ./flink-checkpoints:/opt/flink/checkpoints
    deploy:
      resources:
        limits:
          memory: 5G

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: fluxmeter-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: fluxmeter
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - ./baseline/init.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      - kafka
    deploy:
      resources:
        limits:
          memory: 4G

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fluxmeter-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
      FLUXMETER_AUTH_OPTIONAL: "true"
      BUDGET_FAIL_POLICY: "open"
    depends_on:
      - redis
      - kafka
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:10.3.1
    container_name: fluxmeter-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: fluxmeter
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 512M

  webhook-worker:
    build:
      context: .
      dockerfile: api/Dockerfile.webhook
    container_name: fluxmeter-webhook-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
      ALERT_TOPIC: budget-alerts
    depends_on:
      - redis
      - kafka
    deploy:
      resources:
        limits:
          memory: 128M

  reconcile-job:
    build:
      context: .
      dockerfile: jobs/Dockerfile
    container_name: fluxmeter-reconcile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RECONCILE_INTERVAL_SEC: "300"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis-data:
