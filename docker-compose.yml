# Lite stack: Redis + API + Grafana — no Kafka/Flink. 1-minute try.
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: fluxmeter-redis-lite
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-lite-data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fluxmeter-api-lite
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FLUXMETER_LITE_MODE: "true"
      FLUXMETER_AUTH_OPTIONAL: "true"
      BUDGET_FAIL_POLICY: "open"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:10.3.1
    container_name: fluxmeter-grafana-lite
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: fluxmeter
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis-lite-data:
